name: Fix Folders

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Copy backend files to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USERNAME }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          source: "backend/"
          target: "/home/ubuntu/cloud-messenger/"
          
      - name: Fix Folders
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USERNAME }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script: |
            set -e
            echo "=== Rebuilding backend with newly copied files ==="
            cd /home/ubuntu/cloud-messenger
            sudo docker compose up -d --build backend
            
            echo "=== Waiting for backend and migrations to finish ==="
            sleep 15
            
            echo "=== Fixing null folderIds in existing messages via SQL ==="
            sudo docker exec -i cloud_messenger_db psql -U postgres -d cloud_messenger << 'EOF'
            DO $$
            DECLARE
              main_id TEXT;
            BEGIN
              -- Try to find the Main folder
              SELECT id INTO main_id FROM "Folder" WHERE name = 'Main' LIMIT 1;
              
              -- If it doesn't exist, create it with a random UUID
              IF main_id IS NULL THEN
                main_id := gen_random_uuid()::text;
                INSERT INTO "Folder" (id, name, "createdAt") VALUES (main_id, 'Main', NOW());
                RAISE NOTICE 'Created Main folder with ID %', main_id;
              END IF;
              
              -- Update all old messages
              UPDATE "Message" SET "folderId" = main_id WHERE "folderId" IS NULL;
              RAISE NOTICE 'Updated messages to use Main folder!';
            END $$;
            EOF
            
            echo "=== FIX COMPLETE! ==="
