name: Discover Backups

on:
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - name: List local Oracle backups
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USERNAME }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script: |
            echo "=== Mounted Volumes (df -h) ==="
            df -h
            
            echo "=== Block Devices (lsblk) ==="
            lsblk
            
            echo "=== Searching for Block Volume Mounts ==="
            sudo find /mnt /media -maxdepth 2 -type d 2>/dev/null
            
            echo "=== Searching entire system for backup files (*.tar.gz.enc or *db*.sql) ==="
            sudo find / -name "*.tar.gz.enc" -o -name "*db*.sql" -o -name "*backup*.sql" 2>/dev/null | grep -v "/proc\|/sys\|/overlay" || echo "No backup files found."
            
            echo "=== Checking for OCI CLI again ==="
            OCI_PATH=$(find /home /root /opt -name "oci" -type f -executable 2>/dev/null | head -n 1)
            if [ -n "$OCI_PATH" ]; then
              echo "OCI CLI found at: $OCI_PATH"
              $OCI_PATH os bucket list --compartment-id "$($OCI_PATH setup repair-file-permissions >/dev/null 2>&1; cat ~/.oci/config | grep tenancy | cut -d '=' -f2)" 2>/dev/null || echo "Could not list OCI buckets."
            else
              echo "OCI CLI executable not found."
            fi
            
            echo "=== Checking Cloudflare R2 with Wrangler ==="
            export WRANGLER_SEND_METRICS=false
            if [ -d "$HOME/.config/.wrangler" ] || [ -d "/root/.config/.wrangler" ]; then
              echo "Wrangler config found! Listing R2 buckets..."
              BUCKETS=$(npx wrangler@latest r2 bucket list 2>/dev/null | grep -v 'Wrangler' | grep -v 'npm' || true)
              echo "$BUCKETS"
              
              # Extract bucket names and list objects for each
              echo "$BUCKETS" | grep '"name":' | awk -F '"' '{print $4}' | while read BUCKET; do
                if [ -n "$BUCKET" ]; then
                  echo "--- Objects in Bucket: $BUCKET ---"
                  npx wrangler@latest r2 object list "$BUCKET" 2>/dev/null || echo "Failed to list objects in $BUCKET"
                fi
              done
            else
              echo "No Wrangler configuration found to authenticate R2."
            fi
