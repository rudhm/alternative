name: Restore Database

on:
  workflow_dispatch:

jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - name: Restore DB from R2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USERNAME }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script: |
            set -e
            echo "=== Downloading backup from Cloudflare Worker ==="
            curl -o /tmp/backup.tar.gz -L https://r2-lister.unrudh.workers.dev
            
            echo "=== Extracting backup ==="
            rm -rf /tmp/backup_extract
            mkdir -p /tmp/backup_extract
            tar -xzf /tmp/backup.tar.gz -C /tmp/backup_extract
            
            if [ ! -f /tmp/backup_extract/database.sql ]; then
              echo "Error: database.sql not found in the backup archive!"
              exit 1
            fi
            
            echo "=== Stopping Backend Container ==="
            cd /home/ubuntu/cloud-messenger
            sudo docker compose stop backend
            
            echo "=== Dropping all connections and resetting public schema ==="
            sudo docker exec -i cloud_messenger_db psql -U postgres -d cloud_messenger -c "DROP SCHEMA public CASCADE; CREATE SCHEMA public;"
            
            echo "=== Restoring database from backup ==="
            sudo docker exec -i cloud_messenger_db psql -U postgres -d cloud_messenger < /tmp/backup_extract/database.sql
            
            echo "=== Restoring uploads ==="
            sudo rsync -av --delete /tmp/backup_extract/uploads/ /mnt/chat_data/uploads/
            sudo chown -R ubuntu:ubuntu /mnt/chat_data/uploads
            
            echo "=== Restarting Backend Container (runs Prisma migrations automatically) ==="
            sudo docker compose start backend
            
            echo "=== Waiting for backend to start up ==="
            sleep 10
            
            echo "=== Fixing null folderIds in existing messages ==="
            cat << 'EOF' > /tmp/fix_folders.js
            const { PrismaClient } = require('@prisma/client');
            const prisma = new PrismaClient();
            async function fix() {
              let main = await prisma.folder.findFirst({ where: { name: 'Main' } });
              if (!main) {
                main = await prisma.folder.create({ data: { name: 'Main' } });
              }
              await prisma.message.updateMany({
                where: { folderId: null },
                data: { folderId: main.id }
              });
              console.log("Fixed folder IDs");
            }
            fix().catch(console.error).finally(() => prisma.$disconnect());
            EOF
            
            # Copy script into the backend container and run it using the container's Node.js
            CONTAINER_ID=$(sudo docker compose ps -q backend)
            sudo docker cp /tmp/fix_folders.js $CONTAINER_ID:/tmp/fix_folders.js
            sudo docker exec $CONTAINER_ID node /tmp/fix_folders.js || echo "Script failed, but migrations succeeded"
            
            echo "=== Cleanup ==="
            rm -rf /tmp/backup.tar.gz /tmp/backup_extract /tmp/fix_folders.js
            
            echo "=== RESTORE COMPLETE! ==="
